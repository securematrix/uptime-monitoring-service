<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Monitoring Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Uptime Monitoring Service</h1>
            <button id="addMonitorBtn" class="btn primary">+ Add Monitor</button>
        </header>

        <main>
            <div id="monitorsList" class="monitors-grid">
                <!-- Monitor cards will be injected here -->
            </div>
            
            <div class="details-section" id="detailsSection" style="display: none;">
                <h2 id="detailName">Monitor Details</h2>
                <div class="stats-row">
                    <div class="stat-card">
                        <h3>Uptime (24h)</h3>
                        <p id="statUptime">--%</p>
                    </div>
                    <div class="stat-card">
                        <h3>Avg Response Time</h3>
                        <p id="statAvgResp">-- ms</p>
                    </div>
                    <div class="stat-card">
                        <h3>Downtime Incidents</h3>
                        <p id="statDowntime">--</p>
                    </div>
                </div>
                
                <div class="chart-container">
                    <canvas id="responseTimeChart"></canvas>
                </div>
                
                <h3>Recent Logs</h3>
                <div style="overflow-x:auto;">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Status Code</th>
                                <th>Response Time (ms)</th>
                                <th>State</th>
                            </tr>
                        </thead>
                        <tbody id="logsBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Monitor Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add New Monitor</h2>
            <form id="addMonitorForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="mName" required placeholder="My Website">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" id="mUrl" required placeholder="https://example.com">
                </div>
                <div class="form-group row">
                    <div class="col">
                        <label>Method</label>
                        <select id="mMethod">
                            <option value="GET">GET</option>
                            <option value="HEAD">HEAD</option>
                        </select>
                    </div>
                    <div class="col">
                        <label>Frequency (sec)</label>
                        <input type="number" id="mFrequency" value="60" min="10">
                    </div>
                </div>
                <div class="form-group">
                    <label>Alert Email (Optional)</label>
                    <input type="email" id="mEmail" placeholder="alerts@example.com">
                </div>
                <button type="submit" class="btn primary full-width">Save Monitor</button>
            </form>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
